spring.application.name=project
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/campus_forum?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
mybatis.mapper-locations=classpath*:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.image-dir=uploads/images
app.upload.max-image-size-bytes=5242880
app.cos.enabled=${COS_ENABLED:false}
app.cos.secret-id=${COS_SECRET_ID:}
app.cos.secret-key=${COS_SECRET_KEY:}
app.cos.region=${COS_REGION:ap-beijing}
app.cos.bucket=${COS_BUCKET:}
app.cos.domain=${COS_DOMAIN:}
app.cos.folder=${COS_FOLDER:uploads/images/}
app.moderation.blocked-words=жҜ’е“Ғ,д»ЈиҖғ,д№°еҚ–жһӘж”Ҝ,зҲҶзӮёзү©,з”өдҝЎиҜҲйӘ—
app.moderation.warning-words=е…јиҒҢеҲ·еҚ•,з§ҒдёӢиҪ¬иҙҰ,еӨ–жҢӮ,зҝ»еўҷ,ж Ўеӣӯиҙ·

# и…ҫи®Ҝдә‘еҶ…е®№е®Ўж ёй…ҚзҪ®
app.moderation.tencent.enabled=${TENCENT_MODERATION_ENABLED:false}
app.moderation.tencent.secret-id=${TENCENT_SECRET_ID:}
app.moderation.tencent.secret-key=${TENCENT_SECRET_KEY:}
app.moderation.tencent.region=${TENCENT_REGION:ap-beijing}
app.moderation.tencent.bucket=${TENCENT_BUCKET:}
app.moderation.tencent.biz-type=${TENCENT_BIZ_TYPE:}
app.moderation.tencent.image.enabled=${TENCENT_IMAGE_MODERATION_ENABLED:false}
app.moderation.tencent.image.biz-type=${TENCENT_IMAGE_BIZ_TYPE:}
app.moderation.tencent.image.large-image-detect=${TENCENT_IMAGE_LARGE_IMAGE_DETECT:0}
