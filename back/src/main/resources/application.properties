spring.application.name=project
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/campus_forum?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
mybatis.mapper-locations=classpath*:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.image-dir=uploads/images
app.upload.max-image-size-bytes=5242880
app.moderation.blocked-words=毒品,代考,买卖枪支,爆炸物,电信诈骗
app.moderation.warning-words=兼职刷单,私下转账,外挂,翻墙,校园贷

# 腾讯云内容审核配置
app.moderation.tencent.enabled=${TENCENT_MODERATION_ENABLED:false}
app.moderation.tencent.secret-id=${TENCENT_SECRET_ID:}
app.moderation.tencent.secret-key=${TENCENT_SECRET_KEY:}
app.moderation.tencent.region=${TENCENT_REGION:ap-beijing}
app.moderation.tencent.bucket=${TENCENT_BUCKET:}
app.moderation.tencent.biz-type=${TENCENT_BIZ_TYPE:}
