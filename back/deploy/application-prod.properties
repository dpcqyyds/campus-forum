# 生产环境配置文件
spring.application.name=project

# 数据库配置（生产环境）
spring.datasource.url=jdbc:mysql://localhost:3306/campus_forum?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 不自动执行 schema.sql 和 data.sql（生产环境手动导入）
spring.sql.init.mode=never

# MyBatis 配置
mybatis.mapper-locations=classpath*:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# 图片上传目录（生产环境）
app.upload.image-dir=/opt/campus-forum/uploads/images
app.upload.max-image-size-bytes=5242880

# 内容审核配置
app.moderation.blocked-words=毒品,代考,买卖枪支,爆炸物,电信诈骗
app.moderation.warning-words=兼职刷单,私下转账,外挂,翻墙,校园贷

# 腾讯云内容审核配置
app.moderation.tencent.enabled=false
app.moderation.tencent.secret-id=YOUR_SECRET_ID
app.moderation.tencent.secret-key=YOUR_SECRET_KEY
app.moderation.tencent.region=ap-beijing
app.moderation.tencent.bucket=YOUR_BUCKET_NAME
app.moderation.tencent.biz-type=

# 备份目录
app.backup.directory=/opt/campus-forum/backups

# 服务器端口
server.port=8080

# 日志配置
logging.level.root=INFO
logging.level.org.example.project=INFO
logging.file.name=/opt/campus-forum/logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30
